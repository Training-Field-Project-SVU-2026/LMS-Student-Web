<div
  [routerLink]="['/course', course.slug]"
  class="bg-white rounded-xl shadow p-4 hover:shadow-lg transition cursor-pointer"
>
  <!-- Thumbnail -->
  <img
    [src]="course.image || 'assets/default-course.jpg'"
    [alt]="course.title"
    class="w-full h-40 object-cover rounded-lg mb-3"
  />

  <!-- Title -->
  <h3 class="font-semibold text-sm text-gray-800 mb-2 line-clamp-2">
    {{ course.title }}
  </h3>

  <!-- Progress Label -->
  <div class="flex justify-between items-center mb-1">
    <span class="text-xs text-gray-400">Progress</span>
    <span class="text-xs font-medium text-gray-600">{{ course.progress }}%</span>
  </div>

  <!-- Progress Bar -->
  <div class="w-full bg-gray-200 rounded-full h-2 mb-3">
    <div
      class="h-2 rounded-full transition-all duration-300"
      [class.bg-gray-400]="course.status === 'not_started'"
      [class.bg-blue-500]="course.status === 'in_progress'"
      [class.bg-green-500]="course.status === 'completed'"
      [style.width.%]="course.progress"
    ></div>
  </div>

  <!-- Status Badge -->
  <span
    class="text-xs px-2 py-1 rounded font-medium"
    [ngClass]="{
      'bg-gray-100 text-gray-600':   course.status === 'not_started',
      'bg-yellow-100 text-yellow-700': course.status === 'in_progress',
      'bg-green-100 text-green-700':  course.status === 'completed'
    }"
  >
    {{ statusLabels[course.status] }}
  </span>
</div>
