<section class="py-12 md:py-24">
  <div class="container mx-auto px-4 sm:px-6">
    <div class="text-center mb-12 md:mb-16">
      <h2 class="text-3xl md:text-4xl font-bold text-[var(--text-primary)] mb-4 md:mb-6">
        Why SkillUp is Different
      </h2>
      <p class="text-sm md:text-base text-[var(--text-secondary)] max-w-2xl mx-auto px-4">
        We don't just provide videos; we provide an immersive environment designed for real skill acquisition.
      </p>
    </div>

    @if (features.length > 0) {
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-10">
        @for (item of features; track item.title) {
          <div class="p-6 md:p-10 rounded-[24px] md:rounded-[32px]
                      bg-[var(--background)] shadow-sm border border-[var(--outline)]
                      flex flex-col items-center text-center
                      space-y-4 hover:shadow-md transition-shadow">

            @if (item.iconClass) {
              <div class="w-14 h-14 md:w-16 md:h-16 rounded-2xl flex items-center justify-center mb-4
                          bg-white text-[var(--primary)] shadow-inner">
                <i [class]="item.iconClass + ' text-xl md:text-2xl'"></i>
              </div>
            }

            <h3 class="text-lg md:text-xl font-bold text-[var(--text-primary)]">
              {{ item.title }}
            </h3>

            <p class="text-xs md:text-sm text-[var(--text-secondary)] leading-relaxed">
              {{ item.desc }}
            </p>
          </div>
        }
      </div>
    }
  </div>
</section>
