<section class="pt-20 pb-28 md:pt-24 md:pb-32 px-6 md:px-16 bg-[var(--surface)]">
  <div class="container mx-auto">

    <div class="flex justify-between items-end mb-10">
      <div>
        <h2 class="text-display text-[var(--text-primary)] mb-4">Top Rated</h2>
        <p class="text-body text-[var(--text-secondary)]">
          Our most popular paths for future developers
        </p>
      </div>
      <a class="text-[var(--primary)] font-bold border-b-2 border-[var(--primary)]
                hover:opacity-80 transition cursor-pointer"
         (click)="onViewAllCourses()">
        Go to Explore →
      </a>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
      @for (course of courses; track course.slug) {
        <div (click)="onCourseClick(course.slug)" class="cursor-pointer h-full">
          <app-card [courseData]="course"></app-card>
        </div>
      } @empty {
        <div class="col-span-full text-center py-10 text-[var(--text-secondary)]">
          No courses found at the moment.
        </div>
      }
    </div>

    <!-- Load More Button -->
    @if (hasMore) {
      <div class="flex justify-center mt-10">
        <button
          (click)="loadMore()"
          [disabled]="isLoadingMore"
          class="px-10 py-3 rounded-xl border-2 border-[var(--primary)]
                 text-[var(--primary)] font-bold
                 hover:bg-[var(--primary)] hover:text-white
                 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
          @if (isLoadingMore) {
            <span class="flex items-center gap-2">
              <span class="w-4 h-4 border-2 border-current
                           border-t-transparent rounded-full animate-spin"></span>
              Loading...
            </span>
          } @else {
            View more courses →
          }
        </button>
      </div>
    }

    @if (!hasMore && courses.length > 4) {
      <p class="text-center mt-8 text-sm text-[var(--text-tertiary)]">
        You've seen all {{ courses.length }} courses
      </p>
    }

  </div>
</section>
