<section class="pt-20 pb-28 md:pt-24 md:pb-32 px-6 md:px-16 bg-[var(--surface)]">

  <div class="container mx-auto">

    <div class="flex justify-between items-end mb-10">

      <div>
        <h2 class="text-display text-[var(--text-primary)] mb-4">
          Top Rated
        </h2>

        <p class="text-body text-[var(--text-secondary)]">
          Our most popular paths for future developers
        </p>
      </div>

      <a
        class="text-[var(--primary)] font-bold border-b-2 border-[var(--primary)] hover:opacity-80 transition cursor-pointer"
        (click)="onViewAllCourses()"
      >
        View all courses →
      </a>

    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 grid-rows-[1fr] ff-var(--font-family)">

      @for (course of courses; track course.id) {

     <div (click)="onCourseClick(course.id)" class="cursor-pointer h-full">
  <app-card
    class="h-full flex"
    [courseData]="course">
  </app-card>
</div>

      }

    </div>

  </div>

</section>
