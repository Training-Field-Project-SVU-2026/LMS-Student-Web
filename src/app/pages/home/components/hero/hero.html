<section class="relative min-h-[70vh] flex items-center bg-[var(--background)] px-6 md:px-16 py-8 overflow-hidden">

  <div class="container mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">

    <div class="flex flex-col justify-center space-y-8 z-10">

      <div class="space-y-6">
        <h1 class="text-display text-[var(--text-primary)] leading-[1.2] tracking-tight">
          <span class="text-[var(--secondary)]">“Your</span> Gateway <br>
          to Professional <br>
          Growth”
        </h1>

        <p class="text-body text-[var(--text-secondary)] max-w-lg text-lg opacity-90">
          We don't have a million courses,
          <br class="hidden md:block">
          just the right ones to help you move forward.
        </p>
      </div>

      <div class="flex flex-wrap gap-5">
        <button (click)="onViewHome()"
          class="bg-[var(--secondary)] text-[var(--on-secondary)] px-10 py-4 rounded-xl font-bold hover:bg-[var(--secondary-hover)] transition-all hover:-translate-y-1 active:scale-95 shadow-lg shadow-green-100">
          Start Learning
        </button>

        <button (click)="onViewCourses()"
          class="bg-[var(--primary)] text-white px-10 py-4 rounded-xl font-bold hover:bg-[var(--primary-hover)] transition-all hover:-translate-y-1 active:scale-95 shadow-lg shadow-blue-100">
          Browse Courses
        </button>
      </div>

    </div>


    <div class="relative flex justify-center lg:justify-end items-center">

      <div class="absolute -inset-4 bg-[var(--surface)]/30 blur-3xl rounded-full -z-10"></div>

      <img src="/images/hero-image.jpeg" alt="Professional Growth"
        class="w-full max-w-[600px] h-auto object-contain drop-shadow-2xl animate-float">

    </div>

  </div>

</section>
