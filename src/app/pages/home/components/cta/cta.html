<section class="flex justify-center items-center py-24 px-6 bg-[var(--surface)]">

  <div class="bg-[var(--background)] rounded-[24px] w-full max-w-5xl p-12 md:p-16 text-center
            shadow-sm ring-1 ring-[var(--outline)] ring-opacity-30">

    <h2 class="text-display text-[var(--text-primary)] mb-6">
      Start Your Coding Journey Today
    </h2>

    <p class="text-body text-[var(--text-tertiary)] mb-10">
      Unlimited access to 50+ courses
    </p>

    <button (click)="onViewHome()"
      class="bg-[var(--primary)] hover:bg-[var(--primary-hover)]
             text-[var(--on-primary)]
             px-10 py-4 rounded-xl
             font-semibold
             transition-all duration-300
             shadow-lg">
      Join now
    </button>

  </div>

</section>
