<div class="min-h-screen bg-[var(--background)]">

  <header class="flex items-center justify-between px-8 py-4
                 bg-[var(--surface)] border-b border-[var(--divider)]">

    <div class="flex items-center gap-3 cursor-pointer" routerLink="/home">
      <div class="w-10 h-10 rounded-2xl flex items-center justify-center
                  font-bold text-lg bg-[var(--primary)] text-white">
        SU
      </div>
      <span class="text-xl font-semibold text-[var(--primary)]">
        Skill<span style="color: var(--secondary);">Up</span>
      </span>
    </div>
    <div class="flex items-center gap-4">

      <button
        (click)="toggleTheme()"
        class="p-2 rounded-lg border border-[var(--outline)] hover:bg-[var(--background)]"
      >
        {{ isDark ? '☀️' : '🌙' }}
      </button>

      @if (student(); as s) {
        <div class="text-right hidden sm:block">
          <p class="text-sm font-semibold text-[var(--text-primary)]">{{ fullName }}</p>
          <p class="text-xs text-[var(--text-tertiary)]">{{ s.email }}</p>
        </div>

        <!-- Avatar -->
        @if (s.image) {
          <img [src]="s.image" [alt]="fullName"
               class="w-9 h-9 rounded-full object-cover
                      border-2 border-[var(--secondary)]"/>
        } @else {
          <div class="w-9 h-9 rounded-full bg-[var(--primary)]
                      flex items-center justify-center
                      text-white text-sm font-semibold
                      border-2 border-[var(--secondary)]">
            {{ initials }}
          </div>
        }
      } @else {
        <!-- Skeleton loading -->
        <div class="h-4 w-28 bg-[var(--outline)] rounded animate-pulse hidden sm:block"></div>
        <div class="w-9 h-9 rounded-full bg-[var(--outline)] animate-pulse"></div>
      }

    </div>
  </header>

  <!-- Body -->
  <div class="flex gap-6 p-6 max-w-6xl mx-auto">
    <aside class="w-56 shrink-0">
      <app-side-bar-profile />
    </aside>
    <main class="flex-1 min-w-0">
      <router-outlet />
    </main>
  </div>

</div>
