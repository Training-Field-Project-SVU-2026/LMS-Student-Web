<div class="min-h-screen bg-[var(--background)]">

  <header class="flex items-center justify-between px-8 py-4
                 bg-[var(--surface)] border-b border-[var(--divider)]">


    <div class="flex items-center gap-3 cursor-pointer" routerLink="/home">

      <div class="w-10 h-10 rounded-2xl flex items-center justify-center
                  font-bold text-lg bg-[var(--primary)] text-white">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-10 h-10">
          <rect width="40" height="40" rx="12" fill="var(--primary)" />
          <circle cx="14" cy="14" r="4" fill="white" opacity="0.75" />
          <path d="M6 28c0-4.418 3.582-7 8-7" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.75" />
          <circle cx="26" cy="14" r="4" fill="white" />
          <path d="M34 28c0-4.418-3.582-7-8-7" stroke="white" stroke-width="2.5" stroke-linecap="round" />
          <path d="M17 22 Q20 19 23 22" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" />
        </svg>
      </div>
      <span class="text-xl font-semibold text-[var(--primary)]">
        COMMIT<span style="color: var(--secondary);">Ma3ana</span>
      </span>
    </div>
    <div class="flex items-center gap-4">

      <button (click)="toggleTheme()"
        class="p-2 rounded-lg border border-[var(--outline)] hover:bg-[var(--background)]">
        {{ isDark ? '☀️' : '🌙' }}
      </button>

      @if (student(); as s) {
      <div class="text-right hidden sm:block">
        <p class="text-sm font-semibold text-[var(--text-primary)]">{{ fullName }}</p>
        <p class="text-xs text-[var(--text-tertiary)]">{{ s.email }}</p>
      </div>

      <!-- Avatar -->
      <img appImgFallback [src]="s.image" [srcFallback]="'/images/default-avatar.png'"
        [errorFallback]="'/images/default-avatar.png'" [alt]="fullName" class="w-9 h-9 rounded-full object-cover
                    border-2 border-[var(--secondary)]" />
      } @else {
      <!-- Skeleton loading -->
      <div class="h-4 w-28 bg-[var(--outline)] rounded animate-pulse hidden sm:block"></div>
      <div class="w-9 h-9 rounded-full bg-[var(--outline)] animate-pulse"></div>
      }

    </div>
  </header>

  <!-- Body -->
  <div class="flex gap-6 p-6 max-w-6xl mx-auto">
    <aside class="w-56 shrink-0">
      <app-side-bar-profile />
    </aside>
    <main class="flex-1 min-w-0">
      <router-outlet />
    </main>
  </div>

</div>
