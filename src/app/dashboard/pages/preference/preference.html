<div class="bg-[var(--surface)] rounded-2xl shadow-sm border border-[var(--outline)] p-6">

    <div class="flex items-center gap-3 mb-1">
        <div class="w-9 h-9 rounded-full bg-[var(--primary)] flex items-center justify-center shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M4.098 19.902a3.75 3.75 0 0 0 5.304 0l6.401-6.402M6.75 21A3.75 3.75 0 0 1 3 17.25V4.125C3 3.504 3.504 3 4.125 3h5.25c.621 0 1.125.504 1.125 1.125v4.072M6.75 21a3.75 3.75 0 0 0 3.75-3.75V8.197M6.75 21h13.125c.621 0 1.125-.504 1.125-1.125v-5.25c0-.621-.504-1.125-1.125-1.125h-4.072M10.5 8.197l2.88-2.88c.438-.439 1.15-.439 1.59 0l3.712 3.713c.44.44.44 1.152 0 1.59l-2.879 2.88M6.75 17.25h.008v.008H6.75v-.008Z" />
            </svg>
        </div>
        <div>
            <h2 class="text-base font-semibold text-[var(--text-primary)]">App Preferences</h2>
            <p class="text-sm text-[var(--text-tertiary)]">Customize your application experience.</p>
        </div>
    </div>

    @if (saved()) {
    <div
        class="mt-4 flex items-center gap-2 text-sm text-green-700 bg-green-50 border border-green-200 rounded-xl px-4 py-2.5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
        </svg>
        Preferences saved.
    </div>
    }

    <form [formGroup]="form" class="mt-5 flex flex-col gap-6">

        <div>
            <div class="flex items-center gap-2 mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[var(--primary)]" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253M3 12c0 .778.099 1.533.284 2.253" />
                </svg>
                <span class="text-sm font-semibold text-[var(--text-primary)]">Interface Language</span>
            </div>
            <select formControlName="language"
                class="w-full max-w-xs border border-[var(--outline)] rounded-xl px-4 py-2.5 text-sm text-[var(--text-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--outline)] focus:ring-opacity-30 bg-[var(--surface)] appearance-none cursor-pointer">
                @for (lang of languages; track lang) {
                <option [value]="lang">{{ lang }}</option>
                }
            </select>
        </div>

        <div>
            <div class="flex items-center gap-2 mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[var(--primary)]" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M4.098 19.902a3.75 3.75 0 0 0 5.304 0l6.401-6.402M6.75 21A3.75 3.75 0 0 1 3 17.25V4.125C3 3.504 3.504 3 4.125 3h5.25c.621 0 1.125.504 1.125 1.125v4.072M6.75 21a3.75 3.75 0 0 0 3.75-3.75V8.197M6.75 21h13.125c.621 0 1.125-.504 1.125-1.125v-5.25c0-.621-.504-1.125-1.125-1.125h-4.072M10.5 8.197l2.88-2.88c.438-.439 1.15-.439 1.59 0l3.712 3.713c.44.44.44 1.152 0 1.59l-2.879 2.88M6.75 17.25h.008v.008H6.75v-.008Z" />
                </svg>
                <span class="text-sm font-semibold text-[var(--text-primary)]">Interface Theme</span>
            </div>
            <div class="flex items-center gap-5">
                @for (opt of [{val:'light',label:'Light'},{val:'dark',label:'Dark'},{val:'system',label:'System
                Default'}]; track opt.val) {
                <label class="flex items-center gap-2 text-sm text-[var(--text-secondary)] cursor-pointer">
                    <input type="radio" formControlName="theme" [value]="opt.val"
                        class="accent-[var(--primary)] w-4 h-4 cursor-pointer" />
                    {{ opt.label }}
                </label>
                }
            </div>
        </div>


        <div>
            <button type="button" (click)="save()"
                class="px-5 py-2.5 rounded-xl bg-[var(--primary)] text-white text-sm font-semibold hover:bg-[var(--primary-hover)] transition-colors duration-150">
                Save Preferences
            </button>
        </div>

    </form>
</div>
