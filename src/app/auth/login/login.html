<div class="auth-page">

  <h2 class="text-2xl font-bold text-[var(--text-primary)] mb-1">Welcome Back</h2>
  <p class="text-sm text-[var(--text-tertiary)] mb-6">Good to see you again 👋</p>

  <!-- Tabs -->
  <div class="flex bg-[var(--outline)] rounded-xl p-1 mb-6">
    <button 
      class="flex-1 py-2.5 rounded-[10px] text-sm font-semibold bg-white
             shadow-sm text-[var(--text-primary)] border-none cursor-pointer" routerLink="/auth/login">
      Login
    </button>
    <button
      routerLink="/auth/register"
      class="flex-1 py-2.5 rounded-[10px] text-sm font-medium text-[var(--text-secondary)]
             hover:opacity-70 transition-opacity duration-200 cursor-pointer bg-transparent border-none">
      Register
    </button>
  </div>

  <!-- Form -->
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <!-- Email -->
    <div class="flex items-center gap-3 border border-[var(--outline)] bg-white
                rounded-xl px-4 py-3.5 mb-4 transition-all duration-200
                focus-within:border-[var(--primary)] focus-within:ring-2 focus-within:ring-[var(--primary)]/10">
      <i class="fa-solid fa-envelope text-[var(--text-tertiary)] text-sm"></i>
      <input
        type="email"
        placeholder="Email"
        formControlName="email"
        class="flex-1 border-none outline-none text-sm text-[var(--text-primary)]
               placeholder:text-[var(--text-tertiary)] bg-transparent">
    </div>

    <!-- Password -->
    <div class="flex items-center gap-3 border border-[var(--outline)] bg-white
                rounded-xl px-4 py-3.5 mb-4 transition-all duration-200
                focus-within:border-[var(--primary)] focus-within:ring-2 focus-within:ring-[var(--primary)]/10">
      <i class="fa-solid fa-lock text-[var(--text-tertiary)] text-sm"></i>
      <input
        [type]="showPassword ? 'text' : 'password'"
        placeholder="Password"
        formControlName="password"
        class="flex-1 border-none outline-none text-sm text-[var(--text-primary)]
               placeholder:text-[var(--text-tertiary)] bg-transparent">
      <i
        class="fa-solid text-[var(--text-tertiary)] text-sm cursor-pointer hover:text-[var(--primary)] transition-colors"
        [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"
        (click)="togglePassword()">
      </i>
    </div>

    <!-- Forgot Password -->
    <div class="text-right mb-2">
      
      <a routerLink="/auth/forgot-password"
        class="text-xs text-[var(--primary)] font-medium hover:underline">
        Forgot password?
      </a>
    </div>

    <!-- Submit -->
    <button
      type="submit"
      class="w-full py-3.5 mt-2 rounded-xl bg-[var(--primary)] text-white font-semibold text-sm
             border-none cursor-pointer transition-all duration-200
             hover:bg-[var(--primary-hover)] hover:-translate-y-0.5 hover:shadow-lg">
      Sign In
    </button>

  </form>

  <p class="text-center text-sm text-[var(--text-secondary)] mt-6">
    Don't have an account?
    <a routerLink="/auth/register" class="text-[var(--primary)] font-semibold hover:underline">Register</a>
  </p>

</div>
