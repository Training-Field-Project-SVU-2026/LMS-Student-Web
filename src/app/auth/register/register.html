<div class="auth-page">

  <h2 class="text-2xl font-bold text-[var(--text-primary)] mb-1">Create Account</h2>
  <p class="text-sm text-[var(--text-tertiary)] mb-6">Start your coding journey today 🚀</p>

  <!-- Tabs -->
  <div class="flex bg-[var(--outline)] rounded-xl p-1 mb-6">
    <button routerLink="/auth/login"
      routerLinkActive="!bg-[var(--tab-active-bg)] !shadow-sm !font-semibold !text-[var(--text-primary)]"
      [routerLinkActiveOptions]="{exact: true}" class="flex-1 py-2.5 rounded-[10px] text-sm font-medium text-[var(--text-secondary)]
           hover:opacity-70 transition-all duration-200 cursor-pointer bg-transparent border-none">
      Login
    </button>
    <button routerLink="/auth/register"
      routerLinkActive="!bg-[var(--tab-active-bg)] !shadow-sm !font-semibold !text-[var(--text-primary)]"
      [routerLinkActiveOptions]="{exact: true}" class="flex-1 py-2.5 rounded-[10px] text-sm font-medium text-[var(--text-secondary)]
           hover:opacity-70 transition-all duration-200 cursor-pointer bg-transparent border-none">
      Register
    </button>
  </div>
  <!-- Form -->
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

    <!-- First Name -->
    <div class="flex items-center gap-3 border border-[var(--outline)] bg-[var(--input-bg)]
                rounded-xl px-4 py-3.5 mb-4 transition-all duration-200
                focus-within:border-[var(--primary)] focus-within:ring-2 focus-within:ring-[var(--primary)]/10">
      <!-- User icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="text-[var(--text-tertiary)] shrink-0">
        <circle cx="12" cy="8" r="4" />
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
      </svg>
      <input type="text" placeholder="First Name" formControlName="first_name" class="flex-1 border-none outline-none text-sm text-[var(--text-primary)]
               placeholder:text-[var(--text-tertiary)] bg-transparent">
    </div>

    <!-- Last Name -->
    <div class="flex items-center gap-3 border border-[var(--outline)] bg-[var(--input-bg)]
                rounded-xl px-4 py-3.5 mb-4 transition-all duration-200
                focus-within:border-[var(--primary)] focus-within:ring-2 focus-within:ring-[var(--primary)]/10">
      <!-- User icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="text-[var(--text-tertiary)] shrink-0">
        <circle cx="12" cy="8" r="4" />
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
      </svg>
      <input type="text" placeholder="Last Name" formControlName="last_name" class="flex-1 border-none outline-none text-sm text-[var(--text-primary)]
               placeholder:text-[var(--text-tertiary)] bg-transparent">
    </div>

    <!-- Email -->
    <div class="flex items-center gap-3 border border-[var(--outline)] bg-[var(--input-bg)]
                rounded-xl px-4 py-3.5 mb-4 transition-all duration-200
                focus-within:border-[var(--primary)] focus-within:ring-2 focus-within:ring-[var(--primary)]/10">
      <!-- Envelope icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="text-[var(--text-tertiary)] shrink-0">
        <rect x="2" y="4" width="20" height="16" rx="2" />
        <path d="M2 7l10 7 10-7" />
      </svg>
      <input type="email" placeholder="Email" formControlName="email" class="flex-1 border-none outline-none text-sm text-[var(--text-primary)]
               placeholder:text-[var(--text-tertiary)] bg-transparent">
    </div>

    <!-- Password -->
    <div class="flex items-center gap-3 border border-[var(--outline)] bg-[var(--input-bg)]
                rounded-xl px-4 py-3.5 mb-4 transition-all duration-200
                focus-within:border-[var(--primary)] focus-within:ring-2 focus-within:ring-[var(--primary)]/10">
      <!-- Lock icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="text-[var(--text-tertiary)] shrink-0">
        <rect x="3" y="11" width="18" height="11" rx="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
      <input [type]="showPassword() ? 'text' : 'password'" placeholder="Password" formControlName="password" class="flex-1 border-none outline-none text-sm text-[var(--text-primary)]
               placeholder:text-[var(--text-tertiary)] bg-transparent">
      <!-- Eye toggle -->
      <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="text-[var(--text-tertiary)] cursor-pointer hover:text-[var(--primary)] transition-colors shrink-0"
        (click)="togglePassword()">
        <path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
      <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="text-[var(--text-tertiary)] cursor-pointer hover:text-[var(--primary)] transition-colors shrink-0"
        (click)="togglePassword()">
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a18.9 18.9 0 0 1 5.06-6.06" />
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
        <line x1="1" y1="1" x2="23" y2="23" />
      </svg>
    </div>

    <!-- Confirm Password -->
    <div class="flex items-center gap-3 border border-[var(--outline)] bg-[var(--input-bg)]
                rounded-xl px-4 py-3.5 mb-4 transition-all duration-200
                focus-within:border-[var(--primary)] focus-within:ring-2 focus-within:ring-[var(--primary)]/10">
      <!-- Lock icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="text-[var(--text-tertiary)] shrink-0">
        <rect x="3" y="11" width="18" height="11" rx="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
      <input [type]="showConfirm() ? 'text' : 'password'" placeholder="Confirm Password"
        formControlName="confirmPassword" class="flex-1 border-none outline-none text-sm text-[var(--text-primary)]
               placeholder:text-[var(--text-tertiary)] bg-transparent">
      <!-- Eye toggle -->
      <svg *ngIf="!showConfirm()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="text-[var(--text-tertiary)] cursor-pointer hover:text-[var(--primary)] transition-colors shrink-0"
        (click)="toggleConfirm()">
        <path d="M1 12S5 4 12 4s11 8 11 8-4 8-11 8S1 12 1 12z" />
        <circle cx="12" cy="12" r="3" />
      </svg>
      <svg *ngIf="showConfirm()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="text-[var(--text-tertiary)] cursor-pointer hover:text-[var(--primary)] transition-colors shrink-0"
        (click)="toggleConfirm()">
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a18.9 18.9 0 0 1 5.06-6.06" />
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19" />
        <line x1="1" y1="1" x2="23" y2="23" />
      </svg>
    </div>

    <!-- Submit -->
    <button type="submit" class="w-full py-3.5 mt-2 rounded-xl bg-[var(--primary)] text-white font-semibold text-sm
             border-none cursor-pointer transition-all duration-200
             hover:bg-[var(--primary-hover)] hover:-translate-y-0.5 hover:shadow-lg">
      Create Account
    </button>

  </form>

  <p class="text-center text-sm text-[var(--text-secondary)] mt-6">
    Already have an account?
    <a routerLink="/auth/login" class="text-[var(--primary)] font-semibold hover:underline">Sign in</a>
  </p>

</div>
