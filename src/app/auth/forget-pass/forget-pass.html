<div>
  <div class="relative rounded-2xl">
    <div
      class="absolute -bottom-4 left-8 w-20 h-20 rounded-full bg-[var(--primary)] opacity-[0.06] pointer-events-none">
    </div>
    <div class="absolute top-[10%] left-[5%] w-64 h-64 rounded-full bg-[var(--primary)] opacity-[0.03] pointer-events-none animate-float"></div>

    <div class="absolute top-[90%] right-[90%] w-64 h-64 rounded-full bg-[var(--primary)] opacity-[0.03] pointer-events-none animate-float"></div>
  <div class="absolute bottom-[70%] left-[60%] w-96 h-96 rounded-full bg-[var(--primary)] opacity-[0.04] pointer-events-none animate-float" style="animation-delay: -2s;"></div>
  <div class="absolute top-[15%] right-[10%] w-48 h-48 rounded-full bg-[#A8DF8E] opacity-[0.08] pointer-events-none animate-float" style="animation-delay: -1s;"></div>
  <div class="absolute bottom-[20%] left-[25%] w-36 h-36 rounded-full bg-[#A8DF8E] opacity-[0.06] pointer-events-none animate-float" style="animation-delay: -3.5s;"></div>
  <div class="absolute top-[25%] left-[15%] w-24 h-24 rounded-full bg-[var(--primary)] opacity-[0.05] pointer-events-none animate-float" style="animation-delay: -0.5s;"></div>
  <div class="absolute top-[65%] right-[10%] w-32 h-32 rounded-full bg-[#A8DF8E] opacity-[0.07] pointer-events-none animate-float" style="animation-delay: -2.5s;"></div>
  <div class="absolute bottom-[5%] left-[15%] w-40 h-40 rounded-full bg-[var(--primary)] opacity-[0.02] pointer-events-none animate-float" style="animation-delay: -4s;"></div>
  <div class="absolute bottom-[15%] left-[50%] w-40 h-40 rounded-full bg-[var(--primary)] opacity-[0.02] pointer-events-none animate-float" style="animation-delay: -4s;"></div>


    <div class="relative z-10">

      <div class="mb-6">
        <div class="w-12 h-12 rounded-full bg-[var(--primary)]/10
                  flex items-center justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-[var(--primary)]" fill="none" viewBox="0 0 24 24"
            stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75
               m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25
               v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75
               a2.25 2.25 0 0 0-2.25 2.25v6.75
               a2.25 2.25 0 0 0 2.25 2.25z" />
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-[var(--text-primary)] mb-1">Forgot Password?</h2>
        <p class="text-sm text-[var(--text-tertiary)]">
          Enter your email and we'll send you a reset code.
        </p>
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">

        <div class="flex items-center gap-3 border border-[var(--outline)] bg-[var(--surface)]
                  rounded-xl px-4 py-3.5 transition-all duration-200
                  focus-within:border-[var(--primary)] focus-within:ring-2
                  focus-within:ring-[var(--primary)] focus-within:ring-opacity-10">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-[var(--text-tertiary)] shrink-0" fill="none"
            viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0
               1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25
               0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5
               4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0
               1-1.07-1.916V6.75" />
          </svg>
          <input type="email" placeholder="Enter your email" formControlName="email" class="flex-1 border-none outline-none text-sm text-[var(--text-primary)]
                 placeholder:text-[var(--text-tertiary)] bg-transparent" />
        </div>

        @if (forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched) {
        <p class="text-xs text-[var(--error)] -mt-2">Valid email is required.</p>
        }

        <button type="submit" [disabled]="isLoading" class="w-full py-3.5 rounded-xl bg-[var(--primary)] text-white font-semibold
               text-sm border-none cursor-pointer transition-all duration-200
               hover:bg-[var(--primary-hover)] hover:-translate-y-0.5
               disabled:opacity-60 disabled:cursor-not-allowed">
          <span *ngIf="!isLoading" class="flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 26 26" color="white"
              stroke="white" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12
                 7.372 7.372 0 0 1 21 12c0-.22-.01-.437-.027-.65
                 M6 12l3.269 8.875A59.769 59.769 0 0 0 21.485 12
                 M6 12h.008" />
            </svg>
            Send Reset Code
          </span>
          <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24" fill="none">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z" />
            </svg>
            Sending...
          </span>
        </button>

      </form>

      <p class="text-center text-sm text-[var(--text-secondary)] mt-6">
        Remember your password?
        <a routerLink="/auth/login" class="text-[var(--primary)] font-semibold hover:underline">
          Back to Sign In
        </a>
      </p>

    </div>
  </div>
</div>
