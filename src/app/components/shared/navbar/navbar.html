<nav class="sticky top-0 z-40 bg-[var(--surface)] border-b border-[var(--divider)] px-6 py-3">

  <div class="flex items-center justify-between">

    <!-- LEFT -->
    <div class="flex items-center gap-8">

      <!-- Logo -->
      <a routerLink="/home" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-lg"
          style="background-color: var(--primary); color: var(--on-primary);">
          SU
        </div>
        <span class="text-xl font-semibold" style="color: var(--primary);">
          Skill<span style="color: var(--secondary);">Up</span>
        </span>
      </a>

      <!-- Links -->
      <div class="hidden md:flex items-center gap-6">

        <a routerLink="/home" routerLinkActive="text-[var(--primary)] font-semibold"
          class="text-[var(--text-secondary)] hover:text-[var(--primary)]">
          Home
        </a>

        <a routerLink="/courses" routerLinkActive="text-[var(--primary)] font-semibold"
          class="text-[var(--text-secondary)] hover:text-[var(--primary)]">
          My Courses
        </a>

        <a routerLink="/explore" routerLinkActive="text-[var(--primary)] font-semibold"
          class="text-[var(--text-secondary)] hover:text-[var(--primary)]">
          Explore
        </a>
        
        @if(isLoggedIn) {
        <a routerLink="/" routerLinkActive="text-[var(--primary)] font-semibold"
          class="text-[var(--text-secondary)] hover:text-[var(--primary)]">
          Dashboard
        </a>
        }

      </div>
    </div>

    <div class="flex items-center gap-4">

      <button (click)="toggleTheme()"
        class="p-2 rounded-lg border border-[var(--outline)] hover:bg-[var(--background)]">
        {{ isDark ? '☀️' : '🌙' }}
      </button>

      @if(isLoggedIn && isExplorePage) {
      <div class="hidden lg:flex items-center gap-2 max-w-md">

        <div class="relative w-full">
          <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
          <input type="text" placeholder="Search courses..."
            class="w-full pl-10 pr-4 py-2 border border-[var(--outline)] rounded-xl bg-[var(--background)] text-sm focus:ring-2 focus:ring-[var(--primary)] outline-none" />
        </div>

      </div>
      }


      
    <!-- NavBar Before Login and After Login -->
      <!-- GUEST -->
      @if(!isLoggedIn) {
      <div class="hidden md:flex gap-2">

        <button (click)="goLogin()"
          class="px-4 py-1.5 rounded-lg border bg-[var(--secondary)] text-[var(--primary)] text-sm font-bold">
          Login
        </button>

        <button (click)="goSignup()"
          class="px-4 py-1.5 rounded-lg bg-[var(--primary)] text-[var(--on-primary)] text-sm font-bold">
          Sign Up
        </button>

      </div>
      }

      <!-- USER -->
      @if(isLoggedIn) {
      <div class="relative hidden md:flex items-center gap-3 border-l border-[var(--divider)] pl-4">

        <span class="text-sm font-semibold text-[var(--text-primary)]">
         {{ username ? username : 'User' }}
        </span>

        <!-- Avatar -->
        <div (click)="toggleProfileMenu()"
          class="w-10 h-10 flex items-center justify-center rounded-full bg-[var(--secondary)] text-[var(--primary)] font-bold cursor-pointer">
          {{ username?.charAt(0) }}
        </div>

        <!-- Dropdown -->
        <div *ngIf="isProfileMenuOpen"
          class="absolute right-0 top-12 w-44 bg-[var(--surface)] border border-[var(--outline)] rounded-xl shadow-xl py-2">

          <button (click)="goDashboard()" class="w-full text-left px-4 py-2 text-sm hover:bg-[var(--background)]">
            Dashboard
          </button>

          <button (click)="logout()"
            class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-[var(--background)]">
            Logout
          </button>

        </div>

      </div>
      }

      <!-- Mobile -->
      <button class="md:hidden p-2 border rounded-lg" (click)="toggleMobileMenu()">☰</button>

    </div>
  </div>

  <!-- Mobile Menu -->
  @if(isMobileMenuOpen) {
  <div class="md:hidden mt-4 space-y-3">

    <a routerLink="/home">Home</a>
    <a routerLink="/courses">My Courses</a>
    <a routerLink="/explore">Explore</a>

    <a *ngIf="isLoggedIn" routerLink="/dashboard">Dashboard</a>

  </div>
  }
</nav>
