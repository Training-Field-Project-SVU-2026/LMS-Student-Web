<nav class="sticky top-0 z-40 bg-[var(--surface)] border-b border-[var(--divider)] px-6 py-3 transition-all duration-300">

  <!-- Desktop Navbar -->
  <div class="flex items-center justify-between">

    <!-- Left Section -->
    <div class="flex items-center gap-8">

      <!-- Logo -->
      <a routerLink="/home" class="flex items-center gap-3 cursor-pointer">

        <div class="w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-lg"
             style="background-color: var(--primary); color: var(--on-primary);">
          SU
        </div>

        <span class="text-xl font-semibold" style="color: var(--primary);">
          Skill<span style="color: var(--secondary);">Up</span>
        </span>

      </a>

      <!-- Desktop Links -->
      <div class="hidden md:flex items-center gap-6">

        <a routerLink="/home"
           routerLinkActive="text-[var(--primary)] font-semibold"
           class="text-[var(--text-secondary)] hover:text-[var(--primary)] transition">
          Home
        </a>

        <a routerLink="/courses"
           routerLinkActive="text-[var(--primary)] font-semibold"
           class="text-[var(--text-secondary)] hover:text-[var(--primary)] transition">
          My Courses
        </a>

        <a routerLink="/explore"
           routerLinkActive="text-[var(--primary)] font-semibold"
           class="text-[var(--text-secondary)] hover:text-[var(--primary)] transition">
          Explore
        </a>

      </div>

    </div>

    <!-- Right Section -->
    <div class="flex items-center gap-4">

      <!-- Dark Mode -->
      <button (click)="toggleTheme()"
              class="p-2 rounded-lg border border-[var(--outline)] hover:bg-[var(--background)] transition">
        {{ isDark ? '☀️' : '🌙' }}
      </button>
      <!-- Search Bar for Explore Page -->
@if (isLoggedInTemp && isExplorePage) {
  <div class="hidden lg:flex flex-1 items-center gap-2 max-w-md mx-8">
    <div class="relative w-full">
      <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
        🔍
      </span>
      <input
        type="text"
        placeholder="Search courses..."
        class="w-full pl-10 pr-4 py-2 border border-[var(--outline)] rounded-xl bg-[var(--background)] text-sm focus:ring-2 focus:ring-[var(--primary)] outline-none"
      />
    </div>

    <button class="p-2 rounded-xl border border-[var(--outline)] hover:bg-[var(--secondary)] transition text-xl">
      <span class="text-sm">⚙️</span>
    </button>
  </div>
}

      <!-- Guest User -->
@if (!isLoggedInTemp) {
  <div class="hidden md:flex items-center gap-2">

    <button (click)="goLogin()"
            class="px-4 py-1.5 rounded-lg border bg-[var(--secondary)] text-[var(--primary)] text-sm font-bold">
      Login
    </button>

    <button (click)="goSignup()"
            class="px-4 py-1.5 rounded-lg bg-[var(--primary)] text-[var(--on-primary)] text-sm font-bold">
      Sign Up
    </button>

  </div>
}

      <!-- Profile User -->
      @if (isLoggedInTemp) {

  <div class="relative hidden md:flex items-center gap-3 border-l border-[var(--divider)] pl-4">

    <span class="text-sm font-semibold text-[var(--text-primary)]">
      {{ username }}
    </span>

    <img
      (click)="isProfileMenuOpen = !isProfileMenuOpen"
      src="https://ui-avatars.com/api/?name=Reham" alt=""
      class="w-10 h-10 rounded-full border-2 border-[var(--secondary)] cursor-pointer hover:scale-105 transition"
    />

    @if (isProfileMenuOpen) {

      <div class="absolute right-0 top-12 w-44 bg-[var(--surface)] border border-[var(--outline)] rounded-xl shadow-xl py-2">

        <button (click)="logout()"
                class="w-full text-left px-4 py-2 text-sm font-bold hover:bg-[var(--background)] transition"
                style="color: var(--error);">
          Logout
        </button>

      </div>

    }

  </div>

}

      <!-- Mobile Menu Button -->
      <button
        class="md:hidden p-2 rounded-lg border border-[var(--outline)]"
        (click)="isMobileMenuOpen = !isMobileMenuOpen">
        ☰
      </button>

    </div>

  </div>

  <!-- Mobile Menu -->
  @if (isMobileMenuOpen) {

    <div class="md:hidden mt-4 space-y-4 px-2 pb-3">

      <a routerLink="/home"
         class="block text-[var(--text-secondary)] hover:text-[var(--primary)] transition">
        Home
      </a>

      <a routerLink="/courses"
         class="block text-[var(--text-secondary)] hover:text-[var(--primary)] transition">
        My Courses
      </a>

      <a routerLink="/explore"
         class="block text-[var(--text-secondary)] hover:text-[var(--primary)] transition">
        Explore
      </a>

    </div>

  }

</nav>
