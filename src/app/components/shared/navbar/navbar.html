<nav class="sticky top-0 z-40 bg-[var(--surface)] border-b border-[var(--divider)] px-6 py-3">
  <div class="flex items-center justify-between">

    <!-- ── LEFT: Logo + Links ── -->
    <div class="flex items-center gap-8">

      <!-- Logo -->
      <a routerLink="/home" class="flex items-center gap-3 group">

        <div class="w-10 h-10 rounded-2xl flex items-center justify-center
              bg-[var(--primary)] text-white shadow-md group-hover:scale-105 transition">

          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-10 h-10">
            <rect width="40" height="40" rx="12" fill="var(--primary)" />
            <circle cx="14" cy="14" r="4" fill="white" opacity="0.75" />
            <path d="M6 28c0-4.418 3.582-7 8-7" stroke="white" stroke-width="2.5" stroke-linecap="round"
              opacity="0.75" />
            <circle cx="26" cy="14" r="4" fill="white" />
            <path d="M34 28c0-4.418-3.582-7-8-7" stroke="white" stroke-width="2.5" stroke-linecap="round" />
            <path d="M17 22 Q20 19 23 22" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" />
          </svg>

        </div>

        <span class="text-xl font-semibold tracking-wide">

          <span class="text-[var(--primary)] ml-1">Commit</span>
          <span class="text-[var(--secondary)]">Ma3ana</span>
        </span>

      </a>

      <!-- Desktop Links -->
      <div class="hidden md:flex items-center gap-6 text-sm">

        <a routerLink="/home" routerLinkActive="text-[var(--primary)] font-semibold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-[var(--text-secondary)] hover:text-[var(--primary)] transition-colors">
          Home
        </a>


        <a routerLink="/explore" routerLinkActive="text-[var(--primary)] font-semibold"
          class="text-[var(--text-secondary)] hover:text-[var(--primary)] transition-colors">
          Explore
        </a>
        @if (isLoggedIn()) {
        <a routerLink="/my-courses" routerLinkActive="text-[var(--primary)] font-semibold"
          class="text-[var(--text-secondary)] hover:text-[var(--primary)]">
          My Courses
        </a>
        } @else {
        <a routerLink="/" routerLinkActive="text-[var(--primary)] font-semibold"
          class="text-[var(--text-secondary)] hover:text-[var(--primary)]">
          Courses
        </a>
        }
      </div>
    </div>

    <!-- ── RIGHT: Theme + Auth ── -->
    <div class="flex items-center gap-3">

      <!-- Theme Toggle -->
      <button (click)="toggleTheme()" class="p-2 rounded-lg border border-[var(--outline)]
                     hover:bg-[var(--background)] transition-colors">
        {{ isDark() ? '☀️' : '🌙' }}
      </button>

      <!-- GUEST buttons -->
      @if (!isLoggedIn()) {
      <div class="hidden md:flex gap-2">
        <button (click)="goLogin()" class="px-4 py-1.5 rounded-lg border border-[var(--primary)]
                         text-[var(--primary)] text-sm font-semibold
                         hover:bg-[var(--primary)] hover:text-white transition-all">
          Login
        </button>
        <button (click)="goSignup()" class="px-4 py-1.5 rounded-lg bg-[var(--primary)]
                         text-[var(--on-primary)] text-sm font-semibold
                         hover:bg-[var(--primary-hover)] transition-colors">
          Sign Up
        </button>
      </div>
      }

      <!-- USER avatar + dropdown -->
      @if (isLoggedIn()) {
      <div class="relative hidden md:block profile-menu-wrapper">

        <button (click)="toggleProfileMenu()" class="flex items-center gap-2 rounded-full
                         hover:opacity-80 transition-opacity">

          <span class="text-sm font-semibold text-[var(--text-primary)] hidden lg:block">
            {{ username() ?? 'User' }}
          </span>

          <div class="w-9 h-9 flex items-center justify-center rounded-full
                        bg-[var(--primary)] text-white font-bold text-sm">
            {{ userAvatar() ?? 'U' }}
          </div>
        </button>

        <!-- Dropdown -->
        @if (isProfileMenuOpen) {
        <div class="absolute right-0 top-12 w-44 bg-[var(--surface)]
                        border border-[var(--outline)] rounded-xl shadow-xl py-2 z-50">

          <button (click)="goDashboard()" class="w-full text-left px-4 py-2.5 text-sm
                             text-[var(--text-primary)] hover:bg-[var(--background)]
                             transition-colors">
            ⚙️ Settings
          </button>

          <div class="mx-3 my-1 border-t border-[var(--divider)]"></div>

          <button (click)="logout()" class="w-full text-left px-4 py-2.5 text-sm
                             text-red-500 hover:bg-red-50 transition-colors">
            🚪 Logout
          </button>

        </div>
        }
      </div>
      }

      <!-- Mobile hamburger -->
      <button (click)="toggleMobileMenu()" class="md:hidden p-2 rounded-lg border border-[var(--outline)]
                     hover:bg-[var(--background)] transition-colors">
        {{ isMobileMenuOpen ? '✕' : '☰' }}
      </button>

    </div>
  </div>

  <!-- ── Mobile Menu ── -->
  @if (isMobileMenuOpen) {
  <div class="md:hidden mt-3 pt-3 border-t border-[var(--divider)]
                flex flex-col gap-1 text-sm">

    <a routerLink="/home" routerLinkActive="bg-[var(--primary)] text-white" [routerLinkActiveOptions]="{ exact: true }"
      class="px-4 py-2.5 rounded-xl text-[var(--text-secondary)]
                hover:bg-[var(--background)] transition-colors">
      Home
    </a>

    <a routerLink="/explore" routerLinkActive="bg-[var(--primary)] text-white" class="px-4 py-2.5 rounded-xl text-[var(--text-secondary)]
                hover:bg-[var(--background)] transition-colors">
      Explore
    </a>

    <!-- My Courses mobile -->
    <a (click)="goMyCourses()" class="px-4 py-2.5 rounded-xl text-[var(--text-secondary)]
                hover:bg-[var(--background)] transition-colors cursor-pointer">
      My Courses
    </a>

    @if (isLoggedIn()) {
    <div class="mx-1 my-1 border-t border-[var(--divider)]"></div>

    <button (click)="goDashboard()" class="text-left px-4 py-2.5 rounded-xl text-[var(--text-secondary)]
                       hover:bg-[var(--background)] transition-colors">
      ⚙️ Settings
    </button>

    <button (click)="logout()" class="text-left px-4 py-2.5 rounded-xl text-red-500
                       hover:bg-red-50 transition-colors">
      🚪 Logout
    </button>
    }

    @if (!isLoggedIn()) {
    <div class="mx-1 my-1 border-t border-[var(--divider)]"></div>

    <button (click)="goLogin()" class="text-left px-4 py-2.5 rounded-xl text-[var(--text-secondary)]
                       hover:bg-[var(--background)] transition-colors">
      Login
    </button>

    <button (click)="goSignup()" class="mx-1 px-4 py-2.5 rounded-xl bg-[var(--primary)]
                       text-[var(--on-primary)] font-semibold text-center">
      Sign Up
    </button>
    }

  </div>
  }

</nav>
