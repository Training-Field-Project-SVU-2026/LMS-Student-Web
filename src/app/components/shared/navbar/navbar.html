<nav class="sticky top-0 z-40 bg-[var(--surface)] border-b border-[var(--divider)] px-6 py-3">
  <div class="flex items-center justify-between">
    <!-- ── LEFT: Logo + Links ── -->
    <div class="flex items-center gap-8">
      <!-- Logo -->
      <a routerLink="/home" class="flex items-center gap-2 group">
        <div
          class="w-10 h-10 rounded-2xl flex items-center justify-center bg-white border-2 border-[var(--primary)] shadow-md group-hover:scale-105 transition dark:bg-[var(--primary)] dark:text-white dark:border-0"
        >
          <img
            src="/images/commit ma3ana logo.png"
            alt="CommitMa3ana Logo"
            class="w-10 h-10 rounded-2xl object-cover"
          />
        </div>

        <span class="text-xl font-semibold tracking-wide">
          <span class="text-[var(--primary)] ml-1">Commit</span>
          <span class="text-[var(--secondary)]">Ma3ana</span>
        </span>
      </a>

      <!-- Desktop Links -->
      <div class="hidden md:flex items-center gap-6 text-sm">
        <a
          routerLink="/home"
          routerLinkActive="text-[var(--primary)] font-semibold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="text-[var(--text-secondary)] hover:text-[var(--primary)] transition-colors"
        >
          Home
        </a>

        <a
          routerLink="/explore"
          routerLinkActive="text-[var(--primary)] font-semibold"
          class="text-[var(--text-secondary)] hover:text-[var(--primary)] transition-colors"
        >
          Explore
        </a>
        @if (isLoggedIn()) {
          <a
            routerLink="/my-courses"
            routerLinkActive="text-[var(--primary)] font-semibold"
            class="text-[var(--text-secondary)] hover:text-[var(--primary)]"
          >
            My Courses
          </a>
        }
      </div>
    </div>

    <!-- ── RIGHT: Theme + Auth ── -->
    <div class="flex items-center gap-3">
      <!-- Theme Toggle -->
      <button
        (click)="toggleTheme()"
        class="p-2 rounded-lg border border-[var(--outline)] hover:bg-[var(--background)] transition-colors"
      >
        {{ isDark() ? '☀️' : '🌙' }}
      </button>

      <!-- GUEST buttons -->
      @if (!isLoggedIn()) {
        <div class="hidden md:flex gap-2">
          <button
            (click)="goLogin()"
            class="px-4 py-1.5 rounded-lg border border-[var(--primary)] text-[var(--primary)] text-sm font-semibold hover:bg-[var(--primary)] hover:text-white transition-all"
          >
            Login
          </button>
          <button
            (click)="goSignup()"
            class="px-4 py-1.5 rounded-lg bg-[var(--primary)] text-[var(--on-primary)] text-sm font-semibold hover:bg-[var(--primary-hover)] transition-colors"
          >
            Sign Up
          </button>
        </div>
      }

      <!-- USER avatar + dropdown -->
      @if (isLoggedIn()) {
        <div class="relative hidden md:block profile-menu-wrapper">
          <button
            (click)="toggleProfileMenu()"
            class="flex items-center gap-2 rounded-full hover:opacity-80 transition-opacity"
          >
            <span class="text-sm font-semibold text-[var(--text-primary)] hidden lg:block">
              {{ username() ?? 'User' }}
            </span>

            <div
              class="w-9 h-9 flex items-center justify-center rounded-full bg-[var(--primary)] text-white font-bold text-sm"
            >
              {{ userAvatar() ?? 'U' }}
            </div>
          </button>

          <!-- Dropdown -->
          @if (isProfileMenuOpen) {
            <div
              class="absolute right-0 top-12 w-44 bg-[var(--surface)] border border-[var(--outline)] rounded-xl shadow-xl py-2 z-50"
            >
              <button
                (click)="goDashboard()"
                class="flex items-center gap-2 text-left px-4 py-2.5 rounded-xl text-[var(--text-secondary)] hover:bg-[var(--background)] transition-colors"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M11.25 3c.414 0 .75.336.75.75v1.5a6.75 6.75 0 012.07.86l1.06-1.06a.75.75 0 111.06 1.06l-1.06 1.06c.37.63.65 1.31.82 2.04h1.5a.75.75 0 010 1.5h-1.5a6.75 6.75 0 01-.82 2.04l1.06 1.06a.75.75 0 11-1.06 1.06l-1.06-1.06a6.75 6.75 0 01-2.07.86v1.5a.75.75 0 01-1.5 0v-1.5a6.75 6.75 0 01-2.07-.86l-1.06 1.06a.75.75 0 11-1.06-1.06l1.06-1.06a6.75 6.75 0 01-.82-2.04H3.75a.75.75 0 010-1.5h1.5c.17-.73.45-1.41.82-2.04L5 6.22a.75.75 0 011.06-1.06l1.06 1.06a6.75 6.75 0 012.07-.86v-1.5c0-.414.336-.75.75-.75z"
                  />
                  <circle cx="12" cy="12" r="3" />
                </svg>

                Settings
              </button>
              <div class="mx-3 my-1 border-t border-[var(--divider)]"></div>

              <button
                (click)="logout()"
                class="flex items-center gap-2 text-left px-4 py-2.5 rounded-xl text-red-500 hover:bg-red-50 transition-colors"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="1.5"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M18 12l-3-3m3 3l-3 3m3-3H9"
                  />
                </svg>

                Logout
              </button>
            </div>
          }
        </div>
      }

      <!-- Mobile hamburger -->
      <button
        (click)="toggleMobileMenu()"
        class="md:hidden p-2 rounded-lg border border-[var(--outline)] hover:bg-[var(--background)] transition-colors"
      >
        {{ isMobileMenuOpen ? '✕' : '☰' }}
      </button>
    </div>
  </div>

  <!-- ── Mobile Menu ── -->
  @if (isMobileMenuOpen) {
    <div class="md:hidden mt-3 pt-3 border-t border-[var(--divider)] flex flex-col gap-1 text-sm">
      <a
        routerLink="/home"
        routerLinkActive="bg-[var(--primary)] text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="px-4 py-2.5 rounded-xl text-[var(--text-secondary)] hover:bg-[var(--background)] transition-colors"
      >
        Home
      </a>

      <a
        routerLink="/explore"
        routerLinkActive="bg-[var(--primary)] text-white"
        class="px-4 py-2.5 rounded-xl text-[var(--text-secondary)] hover:bg-[var(--background)] transition-colors"
      >
        Explore
      </a>

      <!-- My Courses mobile -->
      <a
        (click)="goMyCourses()"
        class="px-4 py-2.5 rounded-xl text-[var(--text-secondary)] hover:bg-[var(--background)] transition-colors cursor-pointer"
      >
        My Courses
      </a>

      @if (isLoggedIn()) {
        <div class="mx-1 my-1 border-t border-[var(--divider)]"></div>
        <button
          (click)="goDashboard()"
          class="flex items-center gap-2 text-left px-4 py-2.5 rounded-xl text-[var(--text-secondary)] hover:bg-[var(--background)] transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M11.25 3c.414 0 .75.336.75.75v1.5a6.75 6.75 0 012.07.86l1.06-1.06a.75.75 0 111.06 1.06l-1.06 1.06c.37.63.65 1.31.82 2.04h1.5a.75.75 0 010 1.5h-1.5a6.75 6.75 0 01-.82 2.04l1.06 1.06a.75.75 0 11-1.06 1.06l-1.06-1.06a6.75 6.75 0 01-2.07.86v1.5a.75.75 0 01-1.5 0v-1.5a6.75 6.75 0 01-2.07-.86l-1.06 1.06a.75.75 0 11-1.06-1.06l1.06-1.06a6.75 6.75 0 01-.82-2.04H3.75a.75.75 0 010-1.5h1.5c.17-.73.45-1.41.82-2.04L5 6.22a.75.75 0 011.06-1.06l1.06 1.06a6.75 6.75 0 012.07-.86v-1.5c0-.414.336-.75.75-.75z"
            />
            <circle cx="12" cy="12" r="3" />
          </svg>

          Settings
        </button>

        <button
          (click)="logout()"
          class="flex items-center gap-2 text-left px-4 py-2.5 rounded-xl text-red-500 hover:bg-red-50 transition-colors"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15"
            />
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 12l-3-3m3 3l-3 3m3-3H9" />
          </svg>

          Logout
        </button>
      }

      @if (!isLoggedIn()) {
        <div class="mx-1 my-1 border-t border-[var(--divider)]"></div>

        <button
          (click)="goLogin()"
          class="text-left px-4 py-2.5 rounded-xl text-[var(--text-secondary)] hover:bg-[var(--background)] transition-colors"
        >
          Login
        </button>

        <button
          (click)="goSignup()"
          class="mx-1 px-4 py-2.5 rounded-xl bg-[var(--primary)] text-[var(--on-primary)] font-semibold text-center"
        >
          Sign Up
        </button>
      }
    </div>
  }
</nav>
