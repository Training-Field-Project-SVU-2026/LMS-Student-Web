<nav class="sticky top-0 z-40 bg-[var(--surface)] border-b border-[var(--divider)] px-6 py-3 transition-all duration-300">

  <!-- Desktop Navbar -->
  <div class="flex items-center justify-between">

    <!-- Left Section -->
    <div class="flex items-center gap-8">

      <!-- Logo -->
      <a routerLink="/home" class="flex items-center gap-3 cursor-pointer">
        <div class="w-10 h-10 rounded-2xl flex items-center justify-center font-bold text-lg"
             style="background-color: var(--primary); color: var(--on-primary);">
          SU
        </div>
        <span class="text-xl font-semibold" style="color: var(--primary);">
          Skill<span style="color: var(--secondary);">Up</span>
        </span>
      </a>

      <!-- Desktop Links -->
      <div class="hidden md:flex items-center gap-6">
        <a routerLink="/home" routerLinkActive="text-[var(--primary)] font-semibold"
           class="text-[var(--text-secondary)] hover:text-[var(--primary)] transition">Home</a>
        <a routerLink="/courses" routerLinkActive="text-[var(--primary)] font-semibold"
           class="text-[var(--text-secondary)] hover:text-[var(--primary)] transition">My Courses</a>
        <a routerLink="/explore" routerLinkActive="text-[var(--primary)] font-semibold"
           class="text-[var(--text-secondary)] hover:text-[var(--primary)] transition">Explore</a>
      </div>

    </div>

    <!-- Right Section -->
    <div class="flex items-center gap-4">

      <!-- Dark Mode Toggle -->
      <button (click)="toggleTheme()"
              class="p-2 rounded-lg border border-[var(--outline)] hover:bg-[var(--background)] transition">
        {{ isDark ? '☀️' : '🌙' }}
      </button>

      <!-- Guest User Buttons -->
      <div *ngIf="!isLoggedIn" class="hidden md:flex items-center gap-2">
        <button routerLink="/auth/login"
                class="px-4 py-1.5 rounded-lg border bg-[var(--secondary)] text-[var(--primary)] text-sm font-bold">
          Login
        </button>
        <button routerLink="/auth/register"
                class="px-4 py-1.5 rounded-lg bg-[var(--primary)] text-[var(--on-primary)] text-sm font-bold">
          Sign Up
        </button>
      </div>

      <!-- Logged-in User -->
      <div *ngIf="isLoggedIn" class="relative hidden md:flex items-center gap-3 border-l border-[var(--divider)] pl-4">
        <span class="text-sm font-semibold text-[var(--text-primary)]">{{ username }}</span>
        <img (click)="isProfileMenuOpen = !isProfileMenuOpen"
             [src]="userAvatar"
             alt="avatar"
             class="w-10 h-10 rounded-full border-2 border-[var(--secondary)] cursor-pointer hover:scale-105 transition" />

        <!-- Profile Dropdown -->
        <div *ngIf="isProfileMenuOpen"
             class="absolute right-0 top-12 w-44 bg-[var(--surface)] border border-[var(--outline)] rounded-xl shadow-xl py-2">
          <button (click)="logout()"
                  class="w-full text-left px-4 py-2 text-sm font-bold hover:bg-[var(--background)] transition"
                  style="color: var(--error);">
            Logout
          </button>
        </div>
      </div>

      <!-- Mobile Menu Button -->
      <button class="md:hidden p-2 rounded-lg border border-[var(--outline)]"
              (click)="toggleMobileMenu()">☰</button>

    </div>

  </div>

  <!-- Mobile Menu -->
  <div *ngIf="isMobileMenuOpen" class="md:hidden mt-4 space-y-4 px-2 pb-3">
    <a routerLink="/home" class="block text-[var(--text-secondary)] hover:text-[var(--primary)] transition">Home</a>
    <a routerLink="/courses" class="block text-[var(--text-secondary)] hover:text-[var(--primary)] transition">My Courses</a>
    <a routerLink="/explore" class="block text-[var(--text-secondary)] hover:text-[var(--primary)] transition">Explore</a>
    <button *ngIf="isLoggedIn" (click)="logout()" class="block text-left w-full text-sm font-bold text-[var(--error)]">Logout</button>
    <div *ngIf="!isLoggedIn" class="flex gap-2">
      <button routerLink="/auth/login" class="px-4 py-1.5 rounded-lg bg-[var(--secondary)] text-[var(--primary)] text-sm font-bold">Login</button>
      <button routerLink="/auth/register" class="px-4 py-1.5 rounded-lg bg-[var(--primary)] text-[var(--on-primary)] text-sm font-bold">Sign Up</button>
    </div>
  </div>

</nav>
