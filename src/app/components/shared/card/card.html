<article class="group relative flex flex-col rounded-2xl overflow-hidden
         bg-[var(--surface)] border border-[var(--outline)]
         transition-all duration-300 hover:shadow-lg hover:-translate-y-1 cursor-pointer"
  [class.ring-2]="course.is_enrolled" [class.ring-[var(--primary)]]="course.is_enrolled">

  <!-- Thumbnail -->
  <div class="relative w-full aspect-video overflow-hidden bg-[var(--background)]">
    <img appImgFallback [src]="course.image" [srcFallback]="'/images/default_image.jpeg'"
      [errorFallback]="'/images/error_image.png'" [alt]="course.title"
      class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />

    <!-- Enrolled badge -->
    @if (course.is_enrolled) {
    <span class="absolute top-3 left-3 flex items-center gap-1.5
                   text-[11px] font-semibold tracking-wide
                   bg-[var(--primary)] text-[var(--on-primary)]
                   px-2.5 py-1 rounded-full shadow-sm">
      <svg class="!w-3 !h-3" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
          d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
          clip-rule="evenodd" />
      </svg>
      Enrolled
    </span>
    }

    <!-- Price badge -->
    <span class="absolute top-3 right-3
                 text-[12px] font-bold
                 bg-[var(--surface)] text-[var(--primary)]
                 border border-[var(--outline)]
                 px-2.5 py-1 rounded-full shadow-sm">
      {{ formattedPrice }}
    </span>
  </div>

  <!-- Body -->
  <div class="flex flex-col flex-1 p-5 gap-4 bg-[var(--background)] border-t border-[var(--divider)] line-clamp-6">

    <!-- Title + Description -->
    <div class="flex flex-col gap-1.5">
      <h3 class="text-[15px] font-semibold text-[var(--text-primary)] leading-snug line-clamp-2">
        {{ course.title }}
      </h3>
      <p class="text-[13px] text-[var(--text-secondary)] leading-relaxed line-clamp-2">
        {{ course.description }}
      </p>
    </div>

    <!-- Instructor -->
    <div class="flex items-center gap-2">
      <div class="w-7 h-7 rounded-full bg-[var(--background)] border border-[var(--outline)]
                  flex items-center justify-center shrink-0">
        <span class="text-[10px] font-bold text-[var(--primary)]">
          {{ initials }}
        </span>
      </div>
      <span class="text-[12px] text-[var(--text-secondary)] truncate">{{ course.instructor_name }}</span>
    </div>

    <!-- Divider -->
    <div class="border-t border-[var(--divider)]"></div>

    <!-- Footer: Rating + Students -->
    <div class="flex items-center justify-between">

      <!-- Stars + Rating -->
      <div class="flex items-center gap-1.5">
        <div class="flex items-center gap-0.5">
          @for (star of stars; track $index) {
          <svg class="!w-3.5 !h-3.5 shrink-0" [class.text-amber-400]="star === 'full'"
            [class.text-amber-300]="star === 'half'" [class.text-slate-300]="star === 'empty'" fill="currentColor"
            viewBox="0 0 20 20">
            <path
              d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
          </svg>
          }
        </div>
        <span class="text-[12px] font-semibold text-[var(--text-primary)]">
          {{ course.avg_rating | number:'1.1-1' }}
        </span>
      </div>

      <!-- Students count -->
      <div class="flex items-center gap-1 text-[var(--text-tertiary)]">
        <svg class="!w-3.5 !h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
        <span class="text-[12px] font-medium">{{ studentsFormatted }}</span>
      </div>

    </div>
  </div>
</article>
