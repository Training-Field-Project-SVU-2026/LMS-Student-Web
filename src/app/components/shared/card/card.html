<div
  [routerLink]="['/course', courseData.slug]"
  class="group flex flex-col h-full bg-[var(--surface)] border border-[var(--outline)] rounded-[20px] overflow-hidden transition-all duration-300 hover:-translate-y-2 hover:shadow-xl cursor-pointer"
>
  <div class="relative h-40 md:h-44 shrink-0 overflow-hidden">
    <img
      [src]="courseData.image"
      alt="course"
      class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
    >
  </div>

  <div class="p-4 flex flex-col flex-grow">
    <h3 class="font-bold text-[var(--text-primary)] text-sm md:text-[15px] leading-snug mb-4 flex-grow">
      {{ courseData.title }}
    </h3>

    <div class="flex items-center gap-2 text-[11px] md:text-[12px] pt-3 border-t border-gray-50">
      <span class="text-orange-400 font-bold">⭐ {{ courseData.avg_rating }}</span>
      <span class="text-[var(--text-tertiary)]">
        {{ (courseData.students_count ? (courseData.students_count / 1000).toFixed(1) : 0) }}K students
      </span>
    </div>
  </div>
</div>
